<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jigar Tunnel | فروشگاه حرفه‌ای</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff6a00, #2b6ef0, #0f9b4e, #00d4ff);
            background-size: 400% 400%;
            animation: nebula 14s ease infinite;
            padding: 20px;
            direction: rtl;
            position: relative;
        }

        @keyframes nebula {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ذرات نورانی */
        .particle {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle span {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: floatParticle 8s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* splash screen */
        .splash-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            animation: fadeSlide 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .logo-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(255,106,0,0.5), 0 15px 30px rgba(0,0,0,0.3);
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(255,106,0,0.4); transform: scale(1); }
            100% { box-shadow: 0 0 50px rgba(255,106,0,0.8); transform: scale(1.02); }
        }
        .logo-box i {
            font-size: 5rem;
            color: #ffcc00;
            filter: drop-shadow(0 0 8px orange);
        }
        .shop-name-big {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffdd99);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .slogan {
            color: rgba(255,255,255,0.95);
            font-size: 1rem;
            margin-bottom: 40px;
            font-weight: 500;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .enter-btn {
            background: linear-gradient(95deg, #ff6a00, #ffb347);
            border: none;
            padding: 14px 36px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 20px rgba(0,0,0,0.3);
        }
        .enter-btn:active { transform: scale(0.96); }

        /* کارت‌های شیشه‌ای */
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 22px;
            margin-bottom: 22px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.25);
        }
        .header {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0.3));
            backdrop-filter: blur(12px);
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,215,0,0.5);
        }
        .shop-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #ffdd99, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .announcement-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 8px 16px;
            margin-top: 12px;
            font-size: 13px;
            color: #ffecb3;
            border: 1px solid rgba(255,215,0,0.4);
        }
        .product-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            display: inline-block;
            text-shadow: 0 1px 2px black;
        }
        .product-price {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffcc00;
            margin: 8px 0;
        }
        .multi-location {
            display: inline-block;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            color: #bbffdd;
            margin: 8px 0;
        }
        .stock {
            font-size: 13px;
            color: #ffaaaa;
            margin-top: 6px;
        }
        .buy-btn {
            background: linear-gradient(95deg, #ff6a00, #ff8c2e);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            color: white;
            transition: 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
        }
        .buy-btn:active { transform: scale(0.97); }
        .support-btn { background: linear-gradient(95deg, #0f9b4e, #0b5e2e); }
        .rules-btn { background: linear-gradient(95deg, #6d28d9, #4c1d95); }

        .review {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 14px;
            margin: 12px 0;
            border-right: 4px solid #ffcc00;
        }
        .stars { color: #ffcc00; font-size: 14px; }

        /* مودال با اسکرول اصلاح شده */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.open {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 48px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            max-height: 75vh;      /* حداکثر ارتفاع */
            overflow-y: auto;      /* اسکرول عمودی */
            color: white;
            scrollbar-width: thin;
        }
        .modal-content::-webkit-scrollbar {
            width: 5px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: #334155;
            border-radius: 10px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #ff6a00;
            border-radius: 10px;
        }
        .admin-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 40px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
        }
        .admin-btn {
            background: #3b82f6;
            border: none;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            margin-top: 8px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .admin-btn:active { transform: scale(0.97); }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e293bdd;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            z-index: 10;
            font-size: 18px;
            color: white;
            backdrop-filter: blur(4px);
        }
        footer {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
        }
        .main-shop { display: none; }
        .show-shop { display: block; }
    </style>
</head>
<body>
<div class="theme-toggle" onclick="toggleTheme()">🌓</div>
<div id="toast" class="toast"></div>
<div class="particle" id="particles"></div>

<!-- splash screen -->
<div id="splashScreen" class="splash-screen">
    <div class="logo-box">
        <i class="fas fa-rocket"></i>
    </div>
    <div class="shop-name-big">JIGAR TUNNEL</div>
    <div class="slogan">اینترنت آزاد، پرسرعت و امن</div>
    <button class="enter-btn" id="enterShopBtn">
        <i class="fas fa-arrow-left"></i> ورود به فروشگاه
    </button>
</div>

<!-- صفحه اصلی -->
<div id="mainShop" class="main-shop">
    <div class="container" id="mainContent"></div>
</div>

<!-- مودال قوانین -->
<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h3>📜 قوانین فروشگاه</h3>
        <div style="margin-top: 12px;">
            <p>1️⃣ رسید جعلی ممنوع → مسدودیت</p>
            <p>2️⃣ واریز دقیق مبلغ</p>
            <p>3️⃣ عدم انصراف پس از ارسال کانفیگ</p>
            <p>4️⃣ پشتیبانی فقط در ربات</p>
        </div>
        <button class="admin-btn" onclick="closeRulesModal()">بستن</button>
    </div>
</div>

<!-- مودال خرید -->
<div id="buyModal" class="modal">
    <div class="modal-content">
        <h3 id="modalPlanTitle"></h3>
        <div style="margin: 15px 0;">
            <label>🔢 تعداد:</label>
            <div style="display: flex; gap: 10px; align-items: center; margin-top: 5px;">
                <button id="modalQtyMinus" class="admin-btn" style="width: 40px;">-</button>
                <span id="modalQty" style="font-size: 24px; font-weight: bold;">1</span>
                <button id="modalQtyPlus" class="admin-btn" style="width: 40px;">+</button>
            </div>
        </div>
        <div><label>🎫 کد تخفیف:</label><input id="modalDiscount" class="admin-input" placeholder="مثال: NEWJIGAR"></div>
        <div id="discountFeedback" style="font-size:12px"></div>
        <div style="margin:15px 0;"><label>💰 روش پرداخت:</label><div style="display:flex;gap:10px;"><button id="modalPayWallet" class="admin-btn" style="background:#10b981;">کیف پول</button><button id="modalPayCard" class="admin-btn" style="background:#ff6a00;">کارت به کارت</button></div></div>
        <div style="background:#0f172a; padding:12px; border-radius:28px; text-align:center;">💰 مبلغ کل: <span id="modalTotalPrice" style="font-size:22px;font-weight:bold;">0</span> تومان</div>
        <button id="modalConfirm" class="admin-btn" style="background:#8b5cf6;">✅ نهایی کردن</button>
        <button id="modalCancel" class="admin-btn" style="background:#ef4444; margin-top:10px;">❌ انصراف</button>
    </div>
</div>

<script>
    // ========== تنظیمات ==========
    const BOT_USERNAME = "jigartuunelbot";
    const ADMIN_USERNAME = "PW_AQ";
    const ADMIN_PASSWORD = "AR_13900";

    let isLocked = localStorage.getItem('shop_locked') === 'true';
    let lockReason = localStorage.getItem('shop_lock_reason') || '';
    let announcementText = localStorage.getItem('announcement_text') || "🎁 کد تخفیف جدید: NEWJIGAR (۱۰٪)";

    const products = {
        10: { name: "10 گیگ", price: 90000, icon: "fa-regular fa-gem", locations: ["آلمان", "هلند"], days: 100 },
        20: { name: "20 گیگ", price: 180000, icon: "fa-regular fa-star", locations: ["آلمان", "هلند", "فرانسه"], days: 100 },
        30: { name: "30 گیگ", price: 270000, icon: "fa-solid fa-cloud", locations: ["آلمان", "هلند", "فرانسه", "انگلستان"], days: 100 },
        50: { name: "50 گیگ", price: 450000, icon: "fa-solid fa-bolt", locations: ["آلمان", "هلند", "فرانسه", "انگلستان", "کانادا"], days: 100 }
    };

    let stocks = JSON.parse(localStorage.getItem('product_stocks')) || {10:10,20:8,30:5,50:2};
    let discountCodes = JSON.parse(localStorage.getItem('discount_codes')) || [{code:"NEWJIGAR", percent:10, usesLeft:5, expiry: Date.now()+30*86400000}];
    const reviews = [
        {name:"مهدی", text:"سرعت عالی، پشتیبانی فوق‌العاده", stars:5},
        {name:"سارا", text:"مولتی لوکیشن عالی", stars:5},
        {name:"علی", text:"ارزان و با کیفیت", stars:5}
    ];

    let currentPlan = null, currentQty = 1, currentMethod = null;

    function showToast(msg) { let t=document.getElementById('toast'); t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
    function saveStocks() { localStorage.setItem('product_stocks', JSON.stringify(stocks)); }
    function saveDiscountCodes() { localStorage.setItem('discount_codes', JSON.stringify(discountCodes)); }
    function validateDiscount(code,total) {
        let d = discountCodes.find(d=>d.code===code);
        if(!d) return {valid:false, msg:"کد نامعتبر", final:total};
        if(d.expiry<Date.now()) return {valid:false, msg:"منقضی", final:total};
        if(d.usesLeft<=0) return {valid:false, msg:"استفاده شده", final:total};
        let final = total * (100-d.percent)/100;
        return {valid:true, final:Math.floor(final), msg:`${d.percent}% تخفیف`, discountObj:d};
    }
    function openBuyModal(plan) { if(isLocked){ showToast("فروشگاه در بروزرسانی"); return; } currentPlan=plan; currentQty=1; currentMethod=null; document.getElementById('modalPlanTitle').innerHTML=`<i class="${products[plan].icon}"></i> پلن ${products[plan].name}`; document.getElementById('modalQty').innerText=currentQty; document.getElementById('modalDiscount').value=""; updateModalTotal(); document.getElementById('buyModal').classList.add('open'); }
    function updateModalTotal() { if(!currentPlan) return; let base=products[currentPlan].price*currentQty; let code=document.getElementById('modalDiscount').value.trim().toUpperCase(); let v=validateDiscount(code,base); let fb=document.getElementById('discountFeedback'); fb.innerHTML=(code && !v.valid)?`<span style="color:#f87171;">${v.msg}</span>`:(code&&v.valid)?`<span style="color:#34d399;">${v.msg}</span>`:""; document.getElementById('modalTotalPrice').innerText=(v.valid?v.final:base).toLocaleString(); }
    function finalizePurchase(method) { if(!currentPlan) return; let code=document.getElementById('modalDiscount').value.trim().toUpperCase(); let base=products[currentPlan].price*currentQty; let v=validateDiscount(code,base); if(code && !v.valid){ showToast(v.msg); return; } if(v.valid && v.discountObj){ let idx=discountCodes.findIndex(d=>d.code===code); if(idx!==-1) discountCodes[idx].usesLeft--; saveDiscountCodes(); } let url=`https://t.me/${BOT_USERNAME}?start=buy_${currentPlan}_${currentQty}`; if(code && v.valid) url+=`_${code}`; url+=`_${method}`; tg.openTelegramLink(url); tg.close(); closeBuyModal(); }
    function closeBuyModal() { document.getElementById('buyModal').classList.remove('open'); }
    function showRulesModal() { document.getElementById('rulesModal').classList.add('open'); }
    function closeRulesModal() { document.getElementById('rulesModal').classList.remove('open'); }
    function support() { tg.openTelegramLink(`https://t.me/${ADMIN_USERNAME}`); tg.close(); }
    function trackOrder() { tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?start=track`); tg.close(); }
    function toggleTheme() { document.body.classList.toggle('dark'); }

    // ========== پنل مدیریت با اسکرول اصلاح شده ==========
    function openAdminPanel() {
        let pwd = prompt("رمز مدیریت را وارد کنید:");
        if(pwd !== ADMIN_PASSWORD){ showToast("رمز اشتباه"); return; }
        renderAdminModal();
        document.getElementById('adminModal').classList.add('open');
    }

    function renderAdminModal() {
        let stockHtml = "";
        for(let plan of [10,20,30,50]){
            stockHtml += `
                <div style="margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                    <label style="font-weight: bold;">${products[plan].name}</label>
                    <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                        <button onclick="changeStock(${plan}, -1)" class="admin-btn" style="width: 36px; margin:0;">-</button>
                        <span id="stockVal_${plan}" style="min-width: 45px; text-align: center; font-size: 18px;">${stocks[plan]}</span>
                        <button onclick="changeStock(${plan}, 1)" class="admin-btn" style="width: 36px; margin:0;">+</button>
                        <input type="number" id="stockInput_${plan}" value="${stocks[plan]}" class="admin-input" style="width: 90px; margin:0;">
                        <button onclick="setStockDirect(${plan})" class="admin-btn" style="width: auto; margin:0; padding: 8px 12px;">ثبت</button>
                    </div>
                </div>
            `;
        }
        let discHtml = discountCodes.map(d => `
            <div style="display: flex; justify-content: space-between; align-items: center; background: #0f172a; margin: 8px 0; padding: 8px 12px; border-radius: 40px;">
                <div><strong>${d.code}</strong> (${d.percent}%) <br> <small>باقی: ${d.usesLeft} - انقضا: ${new Date(d.expiry).toLocaleDateString()}</small></div>
                <button onclick="deleteDiscount('${d.code}')" class="admin-btn" style="width: auto; background: #ef4444; margin:0; padding: 6px 12px;">حذف</button>
            </div>
        `).join('');
        let modalHtml = `
            <div class="modal-content">
                <h3 style="margin-bottom: 15px;">🔧 پنل مدیریت</h3>
                <h4>📝 اعلانات</h4>
                <textarea id="announceInput" class="admin-input" rows="2">${announcementText}</textarea>
                <button onclick="saveAnnounce()" class="admin-btn">💾 ذخیره اعلانات</button>
                <hr style="margin: 15px 0; border-color: #334155;">
                <h4>📦 مدیریت موجودی</h4>
                ${stockHtml}
                <hr style="margin: 15px 0;">
                <h4>🎫 کد تخفیف</h4>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <input type="text" id="newCode" placeholder="کد" class="admin-input" style="flex: 2;">
                    <input type="number" id="newPercent" placeholder="درصد" class="admin-input" style="flex: 1;">
                    <input type="number" id="newUses" placeholder="تعداد" class="admin-input" style="flex: 1;">
                    <input type="number" id="newDays" placeholder="روز" class="admin-input" style="flex: 1;">
                </div>
                <button onclick="addDiscount()" class="admin-btn" style="margin-top: 5px;">➕ افزودن کد تخفیف</button>
                <div id="discountList" style="margin-top: 15px; max-height: 200px; overflow-y: auto;">${discHtml || "هیچ کدی موجود نیست"}</div>
                <hr style="margin: 15px 0;">
                <button id="toggleShopBtn" class="admin-btn">${isLocked ? 'فعال کردن فروشگاه' : 'غیرفعال کردن فروشگاه'}</button>
                <button onclick="closeAdminModal()" class="admin-btn" style="background: #ef4444;">بستن</button>
            </div>
        `;
        let modalDiv = document.getElementById('adminModal');
        modalDiv.innerHTML = modalHtml;
        document.getElementById('toggleShopBtn').onclick = () => toggleShopLock();
    }

    window.changeStock = function(plan, delta){
        let newVal = stocks[plan] + delta;
        if(newVal < 0) newVal = 0;
        stocks[plan] = newVal;
        document.getElementById(`stockVal_${plan}`).innerText = newVal;
        document.getElementById(`stockInput_${plan}`).value = newVal;
        saveStocks();
        showToast(`موجودی ${products[plan].name} → ${newVal}`);
    };
    window.setStockDirect = function(plan){
        let v = parseInt(document.getElementById(`stockInput_${plan}`).value);
        if(!isNaN(v) && v >= 0){
            stocks[plan] = v;
            document.getElementById(`stockVal_${plan}`).innerText = v;
            saveStocks();
            showToast("موجودی ثبت شد");
        } else showToast("عدد نامعتبر");
    };
    function saveAnnounce(){
        announcementText = document.getElementById('announceInput').value;
        localStorage.setItem('announcement_text', announcementText);
        renderShopPage();
        showToast("اعلانات ذخیره شد");
    }
    function addDiscount(){
        let code = document.getElementById('newCode').value.trim().toUpperCase();
        let percent = parseInt(document.getElementById('newPercent').value);
        let uses = parseInt(document.getElementById('newUses').value);
        let days = parseInt(document.getElementById('newDays').value);
        if(!code || isNaN(percent) || isNaN(uses) || isNaN(days) || percent <=0 || uses <=0 || days <=0){
            showToast("مقادیر نامعتبر");
            return;
        }
        let expiry = Date.now() + days * 86400000;
        discountCodes.push({code, percent, usesLeft: uses, expiry});
        saveDiscountCodes();
        renderAdminModal();
        showToast(`کد ${code} اضافه شد`);
    }
    function deleteDiscount(code){
        discountCodes = discountCodes.filter(d => d.code !== code);
        saveDiscountCodes();
        renderAdminModal();
        showToast(`کد ${code} حذف شد`);
    }
    function closeAdminModal(){ document.getElementById('adminModal').classList.remove('open'); }
    function toggleShopLock(){
        if(!isLocked){
            let r = prompt("علت خاموشی فروشگاه:");
            if(r){
                isLocked = true;
                localStorage.setItem('shop_locked', 'true');
                localStorage.setItem('shop_lock_reason', r);
                location.reload();
            }
        } else {
            localStorage.setItem('shop_locked', 'false');
            localStorage.removeItem('shop_lock_reason');
            location.reload();
        }
    }

    function renderShopPage() {
        if(isLocked){
            document.getElementById('mainContent').innerHTML = `<div class="card" style="text-align:center;"><h2>🔧 فروشگاه غیرفعال</h2><p>${lockReason}</p><button class="buy-btn" onclick="location.reload()">تلاش مجدد</button></div>`;
            return;
        }
        let html = `
            <div class="card header" onclick="openAdminPanel()">
                <div class="shop-title">🚀 JIGAR TUNNEL</div>
                <p>اینترنت آزاد، پرسرعت و امن</p>
                <div id="greeting"></div>
                <div class="announcement-bar">${announcementText}</div>
            </div>
        `;
        for(let plan in products){
            let p = products[plan];
            let locHtml = p.locations.map(l => `<i class="fas fa-map-marker-alt"></i> ${l}`).join(' • ');
            let stockText = stocks[plan] <= 3 ? `<div class="stock">⚠️ فقط ${stocks[plan]} عدد باقی‌مانده!</div>` : `<div class="stock">موجود: ${stocks[plan]} عدد</div>`;
            html += `
                <div class="card">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <i class="${p.icon}" style="font-size:2rem; color:#ffcc00;"></i>
                        <h2 class="product-title">پلن ${p.name}</h2>
                    </div>
                    <div class="product-price">${p.price.toLocaleString()} تومان</div>
                    <div class="multi-location"><i class="fas fa-globe"></i> ${locHtml}</div>
                    <div><i class="fas fa-calendar-alt"></i> مدت اعتبار: ${p.days} روز</div>
                    ${stockText}
                    <button class="buy-btn" onclick="openBuyModal(${plan})"><i class="fas fa-shopping-cart"></i> خرید ${p.name}</button>
                </div>
            `;
        }
        html += `<div class="card"><h3><i class="fas fa-comments"></i> نظرات کاربران</h3>`;
        reviews.forEach(r => {
            html += `<div class="review"><div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div><div>👤 ${r.name}</div><div>“${r.text}”</div></div>`;
        });
        html += `</div>
            <div class="card" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <button class="buy-btn support-btn" onclick="support()"><i class="fas fa-headset"></i> پشتیبانی</button>
                <button class="buy-btn" onclick="trackOrder()"><i class="fas fa-search"></i> پیگیری سفارش</button>
                <button class="buy-btn rules-btn" onclick="showRulesModal()"><i class="fas fa-gavel"></i> قوانین</button>
            </div>
            <footer>© Jigar Tunnel | اینترنت بدون مرز</footer>
        `;
        document.getElementById('mainContent').innerHTML = html;
        let user = tg.initDataUnsafe?.user;
        let g = document.getElementById('greeting');
        if(g) g.innerHTML = user ? `👋 سلام ${user.first_name}!` : `✨ خوش آمدی`;
        gsap.fromTo(".card", {opacity:0, y:30}, {opacity:1, y:0, stagger:0.05, duration:0.6});
    }

    function enterShop() {
        const splash = document.getElementById('splashScreen');
        const mainShop = document.getElementById('mainShop');
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
            mainShop.classList.add('show-shop');
            renderShopPage();
            gsap.fromTo("#mainShop", {opacity:0, y:20}, {opacity:1, y:0, duration:0.5});
        }, 300);
    }

    // ذرات نورانی
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i=0;i<80;i++) {
            let span = document.createElement('span');
            let size = Math.random()*6+2;
            span.style.width = size+'px'; span.style.height = size+'px';
            span.style.left = Math.random()*100+'%';
            span.style.animationDelay = Math.random()*5+'s';
            span.style.animationDuration = 4+Math.random()*6+'s';
            container.appendChild(span);
        }
    }
    createParticles();

    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let adminModalDiv = document.createElement('div');
    adminModalDiv.id = 'adminModal';
    adminModalDiv.className = 'modal';
    document.body.appendChild(adminModalDiv);

    document.getElementById('modalQtyMinus')?.addEventListener('click',()=>{ if(currentQty>1){ currentQty--; document.getElementById('modalQty').innerText=currentQty; updateModalTotal(); } });
    document.getElementById('modalQtyPlus')?.addEventListener('click',()=>{ if(currentQty<stocks[currentPlan]){ currentQty++; document.getElementById('modalQty').innerText=currentQty; updateModalTotal(); } else showToast(`فقط ${stocks[currentPlan]} عدد موجود!`); });
    document.getElementById('modalDiscount')?.addEventListener('input',updateModalTotal);
    document.getElementById('modalPayWallet')?.addEventListener('click',()=>finalizePurchase('wallet'));
    document.getElementById('modalPayCard')?.addEventListener('click',()=>finalizePurchase('card'));
    document.getElementById('modalConfirm')?.addEventListener('click',()=>{ if(!currentMethod) showToast("روش پرداخت را انتخاب کنید"); else finalizePurchase(currentMethod); });
    document.getElementById('modalCancel')?.addEventListener('click',closeBuyModal);
    document.getElementById('enterShopBtn').addEventListener('click',enterShop);
</script>
</body>
</html>
