<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jigar Tunnel | فروشگاه</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        body {
            background: var(--tg-theme-bg-color, #f8fafc);
            color: var(--tg-theme-text-color, #0f172a);
            direction: rtl;
            padding: 16px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .header:active {
            transform: scale(0.99);
        }
        .shop-title {
            display: inline-block;
            background: linear-gradient(90deg, #ffd89b, #c7e9fb);
            background-size: 200% auto;
            color: #1e293b;
            padding: 0.2em 0.8em;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
            animation: shine 3s linear infinite;
            pointer-events: none;
        }
        @keyframes shine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .product-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .multi-location {
            font-size: 13px;
            color: #10b981;
            margin: 8px 0;
            background: rgba(16,185,129,0.1);
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .qty-btn {
            background: #e2e8f0;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 3px;
        }
        .cart-icon {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #2563eb;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
        }
        .cart-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, white);
            border-radius: 32px 32px 0 0;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 1001;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-panel.open { transform: translateY(0); }
        .close-cart {
            float: left;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .cart-item-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            margin: 0 5px;
        }
        .delete-btn { color: #ef4444; }
        .checkout-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
        }
        .support-btn { background: #2563eb; }
        .review {
            margin: 16px 0;
            padding: 16px;
            background: rgba(0,0,0,0.03);
            border-radius: 28px;
            border-right: 4px solid #fbbf24;
        }
        .stars { color: #fbbf24; font-size: 18px; }
        @media (prefers-color-scheme: dark) {
            body { background: var(--tg-theme-bg-color, #0f172a); }
            .card { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.1); }
            .qty-btn { background: #334155; color: white; }
            .review { background: rgba(255,255,255,0.05); }
        }
        .disabled-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
            font-size: 24px;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .disabled-overlay h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }
        .disabled-overlay p {
            font-size: 18px;
            max-width: 80%;
        }
    </style>
</head>
<body>

<div id="cartPanel" class="cart-panel">
    <button class="close-cart" onclick="toggleCart()">✖</button>
    <h3>🛒 سبد خرید</h3>
    <div id="cartItems"></div>
    <div id="cartTotal"></div>
    <button class="checkout-btn" onclick="checkout()">💰 تسویه نهایی</button>
</div>
<div class="cart-icon" onclick="toggleCart()">🛒<span id="cartCount" class="cart-badge">0</span></div>

<div id="mainContent"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ---------- تنظیمات قفل ----------
    const ADMIN_PASSWORD = "AR_13900";  // رمز اختصاصی شما
    let isLocked = localStorage.getItem('shop_locked') === 'true';
    let lockReason = localStorage.getItem('shop_lock_reason') || '';

    // اگر قفل بود، صفحه غیرفعال نمایش بده
    if (isLocked) {
        document.body.innerHTML = `
            <div class="disabled-overlay">
                <h2>🔧 فروشگاه در حال بروزرسانی</h2>
                <p>${lockReason || 'مدیریت در حال اعمال تغییرات است. لطفاً صبر کنید...'}</p>
                <p style="margin-top:20px; font-size:14px;">(برای فعال‌سازی مجدد، روی عنوان فروشگاه کلیک کرده و رمز را وارد کنید)</p>
            </div>
        `;
        // حتی بعد از قفل، باید تابع unlock رو به هدر متصل کنیم (برای فعال‌سازی مجدد)
        const headerDiv = document.createElement('div');
        headerDiv.style.position = 'fixed';
        headerDiv.style.top = '10px';
        headerDiv.style.left = '0';
        headerDiv.style.right = '0';
        headerDiv.style.textAlign = 'center';
        headerDiv.style.zIndex = '10000';
        headerDiv.innerHTML = '<div style="background:rgba(0,0,0,0.7); display:inline-block; padding:8px 20px; border-radius:40px; cursor:pointer;" onclick="toggleLock()">🔓 مدیر کلیک کنید</div>';
        document.body.appendChild(headerDiv);
        window.toggleLock = toggleLock;
        throw new Error("فروشگاه قفل است");
    }

    // ---------- محصولات و نظرات (همان قبلی) ----------
    const products = {
        10: { name: "10 گیگ", price: 120000, icon: "📦", locations: ["آلمان","هلند","ترکیه"] },
        20: { name: "20 گیگ", price: 240000, icon: "📦", locations: ["آلمان","هلند","ترکیه","فرانسه"] },
        30: { name: "30 گیگ", price: 360000, icon: "📦", locations: ["آلمان","هلند","ترکیه","فرانسه","انگلستان"] },
        40: { name: "40 گیگ", price: 480000, icon: "📦", locations: ["آلمان","هلند","ترکیه","فرانسه","انگلستان","کانادا"] },
        50: { name: "50 گیگ", price: 600000, icon: "⚡", locations: ["آلمان","هلند","ترکیه","فرانسه","انگلستان","کانادا","آمریکا"] }
    };

    const reviews = [
        { name: "مهدی کریمی", text: "بیش از ۸ ماهه استفاده می‌کنم. سرعت عالی و پشتیبانی فوق‌العاده.", stars: 5 },
        { name: "سارا حسینی", text: "مولتی لوکیشن عالی، هر موقع یکی کند باشه سریع عوض می‌کنم. واقعاً راضیم.", stars: 5 },
        { name: "علی رضایی", text: "قیمت مناسب، بدون قطعی، بهترین سرویسی که تا حالا داشتم.", stars: 5 },
        { name: "فاطمه نوری", text: "پشتیبانی ۲۴ ساعته و پاسخگو، حتی مشکلات نت خودم رو حل کردن.", stars: 5 },
        { name: "رضا محمدی", text: "پینگ عالی برای بازی، لوکیشن ترکیه ۳۰ میلی‌ثانیه.", stars: 5 },
        { name: "زهرا کریمی", text: "تنها سرویسی که تحریم رو دور زد و سرعت دانلود بالایی دارم.", stars: 5 }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || { 10:0, 20:0, 30:0, 40:0, 50:0 };

    function saveCart() {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartUI();
        renderCartPanel();
    }
    function updateCartUI() {
        let totalItems = Object.values(cart).reduce((a,b)=>a+b,0);
        document.getElementById('cartCount').innerText = totalItems;
    }
    function renderCartPanel() {
        let container = document.getElementById('cartItems');
        let total = 0;
        for (let p in cart) total += cart[p] * products[p].price;
        let html = '';
        if (total === 0) html = '<p>سبد خرید خالی است</p>';
        else {
            for (let p in cart) {
                if (cart[p] > 0) {
                    html += `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                ${products[p].icon} ${products[p].name} - ${cart[p]} × ${products[p].price.toLocaleString()} تومان
                            </div>
                            <div class="cart-item-actions">
                                <button onclick="addToCart(${p}, -1)">-</button>
                                <button onclick="addToCart(${p}, 1)">+</button>
                                <button class="delete-btn" onclick="removeProduct(${p})">🗑️</button>
                            </div>
                        </div>
                    `;
                }
            }
        }
        container.innerHTML = html;
        document.getElementById('cartTotal').innerHTML = `مجموع: ${total.toLocaleString()} تومان`;
    }
    window.addToCart = function(plan, delta) {
        cart[plan] += delta;
        if (cart[plan] < 0) cart[plan] = 0;
        saveCart();
        let qtySpan = document.getElementById(`qty${plan}`);
        if (qtySpan) qtySpan.innerText = cart[plan];
        if (navigator.vibrate) navigator.vibrate(50);
    };
    window.removeProduct = function(plan) {
        cart[plan] = 0;
        saveCart();
        let qtySpan = document.getElementById(`qty${plan}`);
        if (qtySpan) qtySpan.innerText = 0;
    };
    function toggleCart() {
        document.getElementById('cartPanel').classList.toggle('open');
    }
    function checkout() {
        let totalItems = Object.values(cart).reduce((a,b)=>a+b,0);
        if (totalItems === 0) {
            tg.showPopup({ title: "سبد خالی", message: "هیچ محصولی انتخاب نکردید.", buttons: [{ type: "ok" }] });
            return;
        }
        const BOT_USERNAME = "jigartuunelbot";
        tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?start=cart`);
        tg.close();
    }
    function support() {
        tg.openTelegramLink(`tg://user?id=7955284547`);
    }

    // ---------- قفل و غیرفعال‌سازی (یک کلیک روی عنوان) ----------
    function toggleLock() {
        let enteredPass = prompt("🔐 برای تغییر وضعیت فروشگاه، رمز مدیریت را وارد کنید:");
        if (enteredPass !== ADMIN_PASSWORD) {
            alert("رمز اشتباه است!");
            return;
        }
        // اگر در حالت قفل هستیم، می‌خواهیم فعال کنیم
        if (isLocked) {
            // فعال کردن فروشگاه
            localStorage.setItem('shop_locked', 'false');
            localStorage.removeItem('shop_lock_reason');
            location.reload();  // صفحه را Refresh می‌کند تا فروشگاه دیده شود
        } else {
            // غیرفعال کردن فروشگاه: ابتدا علت را بپرس
            let reason = prompt("علت خاموشی فروشگاه را وارد کنید (مثال: در حال بروزرسانی):", "در حال بروزرسانی، لطفاً چند ساعت دیگر مراجعه کنید");
            if (reason === null) reason = "در حال بروزرسانی";
            localStorage.setItem('shop_locked', 'true');
            localStorage.setItem('shop_lock_reason', reason);
            location.reload();  // صفحه مجدد بارگذاری می‌شود و overlay قفل نمایش داده می‌شود
        }
    }

    // رندر محتوای فروشگاه
    function renderProductsAndReviews() {
        const container = document.getElementById('mainContent');
        let productsHtml = `
            <div class="card header" onclick="toggleLock()">
                <div class="shop-title">JIGAR TUNNEL</div>
                <p>اینترنت آزاد، پرسرعت و امن</p>
                <div class="greeting" id="greeting"></div>
            </div>
        `;
        for (let plan in products) {
            let locList = products[plan].locations.map(l => `📍 ${l}`).join(' • ');
            productsHtml += `
                <div class="card">
                    <div class="product-row">
                        <div class="product-info">
                            <h3>${products[plan].icon} پلن ${products[plan].name}</h3>
                            <div class="product-price" style="font-weight:bold;color:#2563eb;">${products[plan].price.toLocaleString()} تومان</div>
                            <div class="multi-location">🌍 لوکیشن‌ها: ${locList}</div>
                        </div>
                        <div>
                            <button class="qty-btn" onclick="addToCart(${plan}, -1)">-</button>
                            <span id="qty${plan}" style="min-width:30px; display:inline-block; text-align:center;">${cart[plan]}</span>
                            <button class="qty-btn" onclick="addToCart(${plan}, 1)">+</button>
                        </div>
                    </div>
                    <ul style="margin-top:12px; font-size:13px;">
                        <li>✅ سرعت بالا بدون محدودیت</li>
                        <li>✅ پشتیبانی ۲۴ ساعته</li>
                        <li>✅ اتصال همزمان روی ۳ دستگاه</li>
                    </ul>
                </div>
            `;
        }
        let reviewsHtml = `<div class="card"><h3>💬 نظرات مشتریان</h3>`;
        for (let r of reviews) {
            reviewsHtml += `
                <div class="review">
                    <div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
                    <div class="review-name">👤 ${r.name}</div>
                    <div class="review-text">“${r.text}”</div>
                </div>
            `;
        }
        reviewsHtml += `</div>`;
        let buttonsHtml = `
            <div class="card" style="text-align:center;">
                <button class="checkout-btn" onclick="checkout()" style="background:#2563eb;">🛍️ نهایی کردن خرید</button>
                <button class="checkout-btn support-btn" onclick="support()" style="background:#10b981; margin-top:8px;">📞 پشتیبانی</button>
            </div>
            <footer style="text-align:center; font-size:12px; margin:20px 0;">© Jigar Tunnel | اینترنت بدون مرز</footer>
        `;
        container.innerHTML = productsHtml + reviewsHtml + buttonsHtml;
        gsap.fromTo(".card", { opacity: 0, y: 30 }, { opacity: 1, y: 0, stagger: 0.08, duration: 0.5, ease: "back.out(0.5)" });
    }

    const user = tg.initDataUnsafe?.user;
    document.getElementById('mainContent').innerHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center;">در حال بارگذاری...</div>`;
    setTimeout(() => {
        renderProductsAndReviews();
        const greeting = document.getElementById('greeting');
        if (greeting) {
            if (user && user.first_name) greeting.innerText = `👋 سلام ${user.first_name}!`;
            else greeting.innerText = `✨ خوش آمدی`;
        }
    }, 100);
</script>
</body>
</html>
