<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jigar Tunnel | فروشگاه</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}body{background:var(--tg-theme-bg-color,#f8fafc);color:var(--tg-theme-text-color,#0f172a);direction:rtl;padding:16px;transition:background .3s}body.dark{background:#0f172a;color:#e2e8f0}.card{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-radius:32px;padding:20px;margin-bottom:20px;box-shadow:0 10px 25px -5px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.5)}.header{background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;text-align:center;border:none;cursor:pointer}.shop-title{display:inline-block;background:linear-gradient(90deg,#ffd89b,#c7e9fb);background-size:200% auto;color:#1e293b;padding:.2em .8em;border-radius:60px;font-size:2rem;font-weight:800;margin-bottom:10px;animation:shine 3s linear infinite;pointer-events:none}@keyframes shine{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}.announcement-bar{background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:60px;padding:10px 16px;margin:12px 0 0;font-size:14px;text-align:center;color:#ffecb3;border:1px solid rgba(255,215,0,.3)}.product-price{font-weight:700;color:#2563eb;font-size:20px}.multi-location{font-size:13px;color:#10b981;margin:8px 0;background:rgba(16,185,129,.1);padding:6px 12px;border-radius:40px;display:inline-block}.stock{font-size:13px;margin-top:5px;color:#ef4444}.buy-btn{background:linear-gradient(95deg,#2563eb,#4f46e5);color:#fff;border:none;padding:12px 20px;font-size:16px;font-weight:600;border-radius:40px;cursor:pointer;margin-top:12px;width:100%;box-shadow:0 4px 12px rgba(37,99,235,.3)}.buy-btn:active{transform:scale(.97)}.support-btn{background:#10b981}.rules-btn{background:#6c5ce7}.review{margin:16px 0;padding:16px;background:rgba(0,0,0,.03);border-radius:28px;border-right:4px solid #fbbf24}.stars{color:#fbbf24;font-size:18px}.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:2000;visibility:hidden;opacity:0;transition:.2s}.modal.open{visibility:visible;opacity:1}.modal-content{background:var(--tg-theme-bg-color,#fff);border-radius:48px;padding:24px;width:90%;max-width:450px;max-height:80vh;overflow-y:auto}.admin-input{width:100%;padding:10px;margin:8px 0;border-radius:40px;border:1px solid #ccc}.admin-btn{background:#2563eb;color:#fff;border:none;padding:10px;border-radius:40px;width:100%;margin-top:10px;cursor:pointer}.discount-item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #ddd}.toast{position:fixed;bottom:90px;left:20px;background:#333;color:#fff;padding:8px 16px;border-radius:40px;font-size:14px;z-index:1100;opacity:0;transition:.2s;pointer-events:none}.theme-toggle{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.5);border-radius:30px;padding:8px 12px;cursor:pointer;z-index:1002;font-size:20px}footer{text-align:center;font-size:12px;margin-top:20px;opacity:.7}@media (prefers-color-scheme: dark){body{background:var(--tg-theme-bg-color,#0f172a)}.card{background:rgba(30,41,59,.7);border-color:rgba(255,255,255,.1)}.review{background:rgba(255,255,255,.05)}}
    </style>
</head>
<body>
<div class="theme-toggle" onclick="toggleTheme()">🌓</div>
<div id="toast" class="toast"></div>
<div id="mainContent"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const ADMIN_PASSWORD = "AR_13900";
    let isLocked = localStorage.getItem('shop_locked') === 'true';
    let lockReason = localStorage.getItem('shop_lock_reason') || '';
    let announcementText = localStorage.getItem('announcement_text') || "🎁 کد تخفیف جدید: newjigar (۱۰٪)";
    const BOT_USERNAME = "jigartuunelbot";

    // محصولات جدید (قیمت‌ها و لوکیشن‌ها)
    const products = {
        10: { name: "10 گیگ", price: 90000, icon: "📦", locations: ["آلمان","هلند","ترکیه"], days: 100 },
        20: { name: "20 گیگ", price: 180000, icon: "📦", locations: ["آلمان","هلند","ترکیه","فرانسه"], days: 100 },
        30: { name: "30 گیگ", price: 270000, icon: "📦", locations: ["آلمان","هلند","ترکیه","فرانسه","انگلستان"], days: 100 },
        50: { name: "50 گیگ", price: 450000, icon: "⚡", locations: ["آلمان","هلند","ترکیه","فرانسه","انگلستان","کانادا","آمریکا"], days: 100 }
    };

    let stocks = JSON.parse(localStorage.getItem('product_stocks')) || {10:10,20:8,30:5,50:2};
    let discountCodes = JSON.parse(localStorage.getItem('discount_codes')) || [
        { code: "newjigar", percent: 10, usesLeft: 1, expiry: Date.now() + 7*86400000 }
    ];

    const reviews = [
        { name: "مهدی کریمی", text: "بیش از ۸ ماهه استفاده می‌کنم. سرعت عالی و پشتیبانی فوق‌العاده.", stars: 5 },
        { name: "سارا حسینی", text: "مولتی لوکیشن عالی، هر موقع یکی کند باشه سریع عوض می‌کنم. واقعاً راضیم.", stars: 5 },
        { name: "علی رضایی", text: "قیمت مناسب، بدون قطعی، بهترین سرویسی که تا حالا داشتم.", stars: 5 },
        { name: "فاطمه نوری", text: "پشتیبانی ۲۴ ساعته و پاسخگو.", stars: 5 },
        { name: "رضا محمدی", text: "پینگ عالی برای بازی، لوکیشن ترکیه ۳۰ میلی‌ثانیه.", stars: 5 },
        { name: "زهرا کریمی", text: "تنها سرویسی که تحریم رو دور زد.", stars: 5 }
    ];

    function showToast(msg) {
        let toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    function saveStocks() {
        localStorage.setItem('product_stocks', JSON.stringify(stocks));
    }

    function saveDiscountCodes() {
        localStorage.setItem('discount_codes', JSON.stringify(discountCodes));
    }

    function validateDiscountClient(code) {
        let discount = discountCodes.find(d => d.code === code);
        if (!discount) return { valid: false, message: "کد نامعتبر" };
        if (discount.expiry < Date.now()) return { valid: false, message: "کد منقضی شده" };
        if (discount.usesLeft <= 0) return { valid: false, message: "کد استفاده شده" };
        return { valid: true, discountObj: discount };
    }

    function startPurchase(plan) {
        let p = products[plan];
        let qtyInput = prompt(`چند عدد از پلن ${p.name} می‌خواهید؟`, "1");
        if (qtyInput === null) return;
        let qty = parseInt(qtyInput);
        if (isNaN(qty) || qty < 1) { showToast("تعداد نامعتبر"); return; }
        if (qty > stocks[plan]) { showToast(`فقط ${stocks[plan]} عدد موجود است!`); return; }
        let discount = prompt("کد تخفیف دارید؟ (در غیر این صورت رد کنید)", "");
        if (discount === null) discount = "";
        let total = p.price * qty;
        let finalMsg = `مبلغ کل: ${total.toLocaleString()} تومان\nمدت اعتبار: 100 روز`;
        let isValidDiscount = false;
        if (discount.trim() !== "") {
            let validation = validateDiscountClient(discount);
            if (validation.valid) {
                isValidDiscount = true;
                let discountedTotal = total * (100 - validation.discountObj.percent) / 100;
                finalMsg += `\n✅ کد تخفیف ${discount} اعمال شد. مبلغ نهایی: ${Math.floor(discountedTotal).toLocaleString()} تومان`;
            } else {
                finalMsg += `\n⚠️ ${validation.message}. بدون تخفیف ادامه می‌دهید؟`;
            }
        }
        if (confirm(`${finalMsg}\nآیا برای ادامه به ربات منتقل شوید؟`)) {
            let url = `https://t.me/${BOT_USERNAME}?start=buy_${plan}_${qty}`;
            if (discount.trim() !== "") url += `_${encodeURIComponent(discount.trim())}`;
            tg.openTelegramLink(url);
            tg.close();
        }
    }

    // ========== پنل مدیریت ==========
    function openAdminPanel() {
        let pwd = prompt("رمز مدیریت را وارد کنید:");
        if (pwd !== ADMIN_PASSWORD) { showToast("رمز اشتباه"); return; }
        renderAdminModal();
        document.getElementById('adminModal').classList.add('open');
    }

    function renderAdminModal() {
        let stockHtml = "";
        for (let plan of [10,20,30,50]) {
            stockHtml += `
                <div style="margin-bottom:15px;">
                    <label>${products[plan].name}</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button class="qty-btn" onclick="changeStock(${plan}, -1)" style="background:#ccc; border:none; width:36px; height:36px; border-radius:40px; font-size:20px;">-</button>
                        <span id="stockVal_${plan}" style="min-width:40px; text-align:center;">${stocks[plan]}</span>
                        <button class="qty-btn" onclick="changeStock(${plan}, 1)" style="background:#ccc; border:none; width:36px; height:36px; border-radius:40px; font-size:20px;">+</button>
                        <input type="number" id="stockInput_${plan}" value="${stocks[plan]}" style="width:80px; padding:6px; border-radius:20px; border:1px solid #ccc;">
                        <button class="admin-btn" style="width:auto; padding:6px 12px;" onclick="setStockDirect(${plan})">ثبت</button>
                    </div>
                </div>
            `;
        }

        let discountListHtml = "";
        for (let d of discountCodes) {
            discountListHtml += `
                <div class="discount-item">
                    <span><strong>${d.code}</strong> (${d.percent}%) - باقی‌مانده: ${d.usesLeft} - انقضا: ${new Date(d.expiry).toLocaleDateString()}</span>
                    <button class="admin-btn" style="width:auto; padding:4px 12px; background:#ef4444;" onclick="deleteDiscountCode('${d.code}')">حذف</button>
                </div>
            `;
        }
        if (discountListHtml === "") discountListHtml = "<p>هیچ کد تخفیفی موجود نیست.</p>";

        let modalHtml = `
            <div class="modal-content">
                <h3>🔧 پنل مدیریت</h3>
                <h4>✏️ ویرایش اعلانات</h4>
                <textarea id="announcementInput" class="admin-input" rows="2">${announcementText}</textarea>
                <button class="admin-btn" onclick="saveAnnouncement()">💾 ذخیره اعلانات</button>
                <hr>
                <h4>📦 مدیریت موجودی</h4>
                ${stockHtml}
                <hr>
                <h4>🎫 مدیریت کدهای تخفیف</h4>
                <div style="display:flex; gap:5px; flex-wrap:wrap;">
                    <input type="text" id="newCode" placeholder="کد جدید" class="admin-input" style="flex:2;">
                    <input type="number" id="newPercent" placeholder="درصد" class="admin-input" style="flex:1;">
                    <input type="number" id="newUses" placeholder="تعداد مصرف" class="admin-input" style="flex:1;">
                    <input type="number" id="newDays" placeholder="اعتبار (روز)" class="admin-input" style="flex:1;">
                    <button class="admin-btn" onclick="addDiscountCode()">➕ افزودن کد</button>
                </div>
                <div id="discountList">${discountListHtml}</div>
                <hr>
                <button class="admin-btn" id="toggleShopBtn">${isLocked ? 'فعال کردن فروشگاه' : 'غیرفعال کردن فروشگاه'}</button>
                <button class="admin-btn" onclick="closeAdminModal()">بستن</button>
            </div>
        `;
        let modalDiv = document.getElementById('adminModal');
        modalDiv.innerHTML = modalHtml;
        document.getElementById('toggleShopBtn').onclick = () => toggleShopLock();
    }

    window.changeStock = function(plan, delta) {
        let newVal = stocks[plan] + delta;
        if (newVal < 0) newVal = 0;
        stocks[plan] = newVal;
        document.getElementById(`stockVal_${plan}`).innerText = newVal;
        document.getElementById(`stockInput_${plan}`).value = newVal;
        saveStocks();
        showToast(`موجودی ${products[plan].name} → ${newVal}`);
    };
    window.setStockDirect = function(plan) {
        let val = parseInt(document.getElementById(`stockInput_${plan}`).value);
        if (!isNaN(val) && val >= 0) {
            stocks[plan] = val;
            document.getElementById(`stockVal_${plan}`).innerText = val;
            saveStocks();
            showToast(`موجودی ${products[plan].name} تنظیم شد به ${val}`);
        } else showToast('عدد نامعتبر');
    };

    function saveAnnouncement() {
        let newText = document.getElementById('announcementInput').value;
        announcementText = newText;
        localStorage.setItem('announcement_text', announcementText);
        renderShopPage();
        showToast("اعلانات ذخیره شد");
    }

    function addDiscountCode() {
        let code = document.getElementById('newCode').value.trim().toUpperCase();
        let percent = parseInt(document.getElementById('newPercent').value);
        let usesLeft = parseInt(document.getElementById('newUses').value);
        let days = parseInt(document.getElementById('newDays').value);
        if (!code || isNaN(percent) || isNaN(usesLeft) || isNaN(days) || percent <= 0 || usesLeft <= 0 || days <= 0) {
            showToast("لطفاً تمام مقادیر را به درستی وارد کنید");
            return;
        }
        let expiry = Date.now() + days * 86400000;
        discountCodes.push({ code, percent, usesLeft, expiry });
        saveDiscountCodes();
        renderAdminModal();
        showToast(`کد ${code} با موفقیت اضافه شد`);
    }

    function deleteDiscountCode(code) {
        discountCodes = discountCodes.filter(d => d.code !== code);
        saveDiscountCodes();
        renderAdminModal();
        showToast(`کد ${code} حذف شد`);
    }

    function closeAdminModal() {
        document.getElementById('adminModal').classList.remove('open');
    }

    function toggleShopLock() {
        if (!isLocked) {
            let reason = prompt("علت خاموشی فروشگاه را وارد کنید:", "در حال بروزرسانی");
            if (reason) {
                isLocked = true;
                localStorage.setItem('shop_locked', 'true');
                localStorage.setItem('shop_lock_reason', reason);
                location.reload();
            }
        } else {
            localStorage.setItem('shop_locked', 'false');
            localStorage.removeItem('shop_lock_reason');
            location.reload();
        }
    }

    // ========== نمایش قوانین ==========
    function showRules() {
        const rulesText = `🚨 **قوانین و ضوابط فروشگاه Jigar Tunnel** 🚨

1️⃣ **رسید جعلی ممنوع**  
هرگونه ارسال رسید دستکاری‌شده، فیک یا متعلق به شخص دیگر، باعث مسدودیت دائمی شما خواهد شد.

2️⃣ **واریز دقیق مبلغ**  
دقیقاً به میزان اعلام‌شده واریز کنید. واریز کمتر باعث تأخیر در تحویل می‌شود.

3️⃣ **عدم انصراف پس از ارسال گانفیک**  
امکان عودت وجه وجود ندارد.

4️⃣ **مسئولیت نگهداری کانفیگ با شماست**  
در صورت لو رفتن، مسئولیت بر عهده کاربر است.

5️⃣ **پشتیبانی فقط در ربات**  
پیام‌های خارج از ربات پاسخ داده نمی‌شود.

6️⃣ **تغییر قیمت‌ها محفوظ است**  
خریدهای انجام‌شده مشمول قیمت روز پرداخت هستند.

7️⃣ **زمان ارسال گانفیک**  
حداکثر 12 ساعت پس از تأیید رسید.

8️⃣ **بدون تأیید رسید، گانفیک ارسال نمی‌شود**  
لطفاً صبور باشید.

⚠️ تخلف از هر بند = مسدودیت دائمی`;
        tg.showPopup({
            title: "📜 قوانین فروشگاه",
            message: rulesText,
            buttons: [{ type: "ok" }]
        });
    }

    function renderShopPage() {
        const container = document.getElementById('mainContent');
        let html = `
            <div class="card header" onclick="openAdminPanel()">
                <div class="shop-title">JIGAR TUNNEL</div>
                <p>اینترنت آزاد، پرسرعت و امن</p>
                <div id="greeting"></div>
                <div class="announcement-bar">${announcementText}</div>
            </div>
        `;
        for (let plan in products) {
            let p = products[plan];
            let locList = p.locations.slice(0,2).map(l=>`📍 ${l}`).join(' • ') + (p.locations.length>2 ? ' ...' : '');
            let stockText = stocks[plan] <= 3 ? `<div class="stock">⚠️ فقط ${stocks[plan]} عدد باقی‌مانده!</div>` : `<div class="stock">موجود: ${stocks[plan]} عدد</div>`;
            html += `
                <div class="card">
                    <div>
                        <h3>${p.icon} پلن ${p.name}</h3>
                        <div class="product-price">${p.price.toLocaleString()} تومان</div>
                        <div class="multi-location">🌍 ${locList}</div>
                        <div class="stock">✅ مدت اعتبار: 100 روز</div>
                        ${stockText}
                    </div>
                    <button class="buy-btn" onclick="startPurchase(${plan})">🛒 خرید ${p.name}</button>
                </div>
            `;
        }
        html += `<div class="card"><h3>💬 نظرات کاربران</h3>`;
        for (let r of reviews) html += `<div class="review"><div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div><div class="review-name">👤 ${r.name}</div><div class="review-text">“${r.text}”</div></div>`;
        html += `</div>
            <div class="card" style="text-align:center;">
                <button class="buy-btn support-btn" onclick="support()">📞 پشتیبانی</button>
                <button class="buy-btn" onclick="trackOrder()" style="background:#6c5ce7;">🔍 پیگیری سفارش</button>
                <button class="buy-btn rules-btn" onclick="showRules()" style="background:#6c5ce7; margin-top:8px;">📜 قوانین</button>
            </div>
            <footer>© Jigar Tunnel | اینترنت بدون مرز</footer>
        `;
        container.innerHTML = html;
        let user = tg.initDataUnsafe?.user;
        let greetingElem = document.getElementById('greeting');
        if (greetingElem) {
            if (user && user.first_name) greetingElem.innerText = `👋 سلام ${user.first_name}!`;
            else greetingElem.innerText = `✨ خوش آمدی`;
        }
        gsap.fromTo(".card", { opacity: 0, y: 30 }, { opacity: 1, y: 0, stagger: 0.05, duration: 0.5 });
    }

    function trackOrder() {
        tg.openTelegramLink(`https://t.me/${BOT_USERNAME}?start=track`);
        tg.close();
    }

    function support() {
        tg.openTelegramLink(`tg://user?id=7955284547`);
        tg.close();
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('manual_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    if (isLocked) {
        document.body.innerHTML = `<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:white; display:flex; align-items:center; justify-content:center; flex-direction:column; z-index:9999; text-align:center;">
            <h2>🔧 فروشگاه در حال بروزرسانی</h2>
            <p>${lockReason}</p>
            <button onclick="unlockShop()" style="margin-top:30px; background:#2563eb; border:none; padding:12px 24px; border-radius:40px; color:white; font-size:16px; cursor:pointer;">🔓 فعال‌سازی (مدیر)</button>
        </div>`;
        window.unlockShop = function() {
            let pwd = prompt("رمز مدیریت را وارد کنید:");
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('shop_locked', 'false');
                localStorage.removeItem('shop_lock_reason');
                location.reload();
            } else alert("رمز اشتباه!");
        };
        throw new Error("Locked");
    }

    if (localStorage.getItem('manual_theme') === 'dark') document.body.classList.add('dark');
    let modalDiv = document.createElement('div');
    modalDiv.id = 'adminModal';
    modalDiv.className = 'modal';
    document.body.appendChild(modalDiv);
    renderShopPage();
</script>
</body>
</html>
